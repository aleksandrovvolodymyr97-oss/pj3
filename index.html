<!DOCTYPE html>
<html>
    <head>
        <title>Order Summary</title>
        <link rel="icon" type="image/x-icon" href="./favicon-32x32.png">
        <link rel="stylesheet" href="./general.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Roboto:ital@0;1&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <section class="ordersummary">
                <img class="ordersummary-pic" src="./illustration-hero.svg">
                <div class="ordersummary-title">Order Summary</div>
                <div class="ordersummary-text">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</div>
                <div class="ordersummary-plan">
                    <div class="ordersummary-plan-pic"><img src="./icon-music.svg"></div>
                        <div class="ordersummary-plan-text">
                            <div class="ordersummary-plan-text-up">Annual Plan</div>
                            <div class="ordersummary-plan-text-down">$59.99/year</div>
                        </div>
                    <div class="ordersummary-plan-change">Change</div>
                </div>
                <button class="button-payment">Proceed to Payment</button>
                <div class="cancel-order">Cancel Order</div>
            </section>
            <div class="autor">Challenge by <a href="https://www.frontendmentor.io/?ref=challenge" target="_blank">Frontend Mentor.</a> Coded by <a href="https://github.com/aleksandrovvolodymyr97-oss">Volodymyr Aleksandrov.</a></div>
        </main>
    </body>
</html>
